<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Te Ara Hura Trail Map</title>
  
  <!-- Local copies of MapLibre GL JS -->
  <script src="lib/maplibre-gl.5.10.0.js"></script>
  <link href="lib/maplibre-gl.5.10.0.css" rel="stylesheet" />
  
  <!-- PMTiles support -->
  <script src="lib/pmtiles.4.3.0.js"></script>

<style>
    body {
        margin: 0;
        padding: 0;
    }
    #map {
        width: 100vw;
        height: 100vh;
    }
</style>
</head>
<body>
  <div id="map"></div>
  
<script>
    // Initialize PMTiles protocol
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);

    // JavaScript to create a new map using MapLibre GL JS
    const map = new maplibregl.Map({
      container: 'map',
      style: 'style.json',
      center: [175.0709, -36.7990],
      zoom: 12
    });

        // Show popup on click
    map.on('click', 'trail-line-hit', function(e) {
      const properties = e.features[0].properties;
      const name = properties.name || 'Te Ara Hura';
      const surface = properties.surface ? `<br>Surface: ${properties.surface}` : '';

      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(`<strong>${name}</strong>${surface}`)
        .addTo(map);
    });

    // Show hover layer and pointer cursor on mouseenter
    map.on('mouseenter', 'trail-line-hit', function() {
      map.getCanvas().style.cursor = 'pointer';
      map.setLayoutProperty('trail-line', 'visibility', 'none');
      map.setLayoutProperty('trail-line-hover', 'visibility', 'visible');
    });

    // Restore default layer and cursor on mouseleave
    map.on('mouseleave', 'trail-line-hit', function() {
      map.getCanvas().style.cursor = '';
      map.setLayoutProperty('trail-line', 'visibility', 'visible');
      map.setLayoutProperty('trail-line-hover', 'visibility', 'none');
    });

    // Add navigation controls (zoom, rotate, pitch)
    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    // Add scale bar
    map.addControl(new maplibregl.ScaleControl({
      maxWidth: 100,
      unit: 'metric'
    }), 'bottom-left');

    // Add a home button
    class HomeControl {
      onAdd(map) {
        this._map = map;
        this._container = document.createElement('div');
        this._container.className = 'maplibregl-ctrl maplibregl-ctrl-group';
        this._container.innerHTML = '<button type="button" title="Home"><svg viewBox="0 0 20 20" width="20" height="20" fill="currentColor"><path d="M10 2L2 9h3v7h4v-5h2v5h4V9h3L10 2z"/></svg></button>';
        this._container.addEventListener('click', () => {
          map.flyTo({ center: [175.0709, -36.7990], zoom: 12, bearing: 0 });
        });
        return this._container;
      }
      onRemove() { this._container.remove(); }
    }

    map.addControl(new HomeControl(), 'top-right');
</script>
</body>
</html>
